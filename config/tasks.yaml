analyser_demande_initiale:
  description: >
    À partir de la demande métier fournie ci-dessous, produire une reformulation
    structurée du besoin. Identifier le problème principal, le contexte hospitalier,
    les objectifs exprimés et les enjeux implicites.

    Demande métier :
    {domain_request}

    Ne propose pas encore de solution technique. Ne produis pas encore de modèle DDD détaillé.
  expected_output: >
    Un document Markdown structuré contenant :
    - une reformulation claire du besoin ;
    - le problème métier principal ;
    - les objectifs opérationnels ;
    - les enjeux de sécurité, délai, traçabilité et interprétation ;
    - les points encore ambigus à clarifier.
  output_file: outputs/01_reformulation_du_besoin.md
  agent: domain_understanding_analyst

identifier_acteurs_domaine:
  description: >
    Identifier les acteurs humains, organisationnels et techniques mentionnés ou
    implicitement concernés par le circuit des demandes urgentes de dosage anti-Xa.

    Demande métier :
    {domain_request}

    Ne fais pas encore de cartographie DDD avancée. Reste au niveau de la compréhension initiale.
  expected_output: >
    Un document Markdown structuré contenant :
    - la liste des acteurs ;
    - leur rôle probable dans le processus ;
    - leurs responsabilités ;
    - leurs interactions principales ;
    - les zones de dépendance entre acteurs.
  output_file: outputs/02_acteurs_du_domaine.md
  agent: domain_understanding_analyst

identifier_concepts_metier:
  description: >
    Extraire les principaux concepts métier présents dans la demande, sans encore les
    transformer en entités DDD, agrégats ou value objects. L’objectif est de constituer
    une première base de vocabulaire métier.

    Demande métier :
    {domain_request}
  expected_output: >
    Un document Markdown structuré contenant :
    - les concepts métier identifiés ;
    - une définition courte pour chaque concept ;
    - les informations associées à chaque concept ;
    - les termes qui nécessitent validation auprès des experts métier.
  output_file: outputs/03_concepts_metier_initiaux.md
  agent: domain_understanding_analyst

identifier_contraintes_risques:
  description: >
    Identifier les contraintes critiques du domaine ainsi que les risques associés à
    une mauvaise gestion du circuit de demande urgente de dosage anti-Xa.

    Demande métier :
    {domain_request}
  expected_output: >
    Un document Markdown structuré contenant :
    - les contraintes temporelles ;
    - les contraintes de qualité pré-analytique ;
    - les contraintes d'information clinique ;
    - les contraintes de traçabilité ;
    - les risques métier associés ;
    - les conséquences possibles pour la prise en charge patient.
  output_file: outputs/04_contraintes_et_risques.md
  agent: domain_understanding_analyst

produire_vision_globale:
  description: >
    Synthétiser l’ensemble de la compréhension initiale du domaine afin de produire
    une vision globale exploitable pour la suite de la démarche DDD.

    Demande métier :
    {domain_request}

    Cette synthèse doit rester au niveau de l'étape 1 : comprendre le domaine métier.
    Ne pas produire encore de bounded contexts, d'agrégats, d'architecture logicielle
    ou de modèle de données.
  expected_output: >
    Un document Markdown structuré contenant :
    - une synthèse du domaine ;
    - les acteurs principaux ;
    - le parcours métier actuel supposé ;
    - les irritants métier ;
    - les objectifs du futur circuit informatisé ;
    - les informations à collecter avant de passer à l’étape 2.
  output_file: outputs/05_vision_globale_du_domaine.md
  agent: domain_understanding_analyst
